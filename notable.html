<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notable Asteroids — NEOWatch</title>
    <meta
      name="description"
      content="A curated gallery of famous asteroids, impact events and mission targets."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container container-narrow">
        <a class="navbar-brand" href="index.html">☄️ NEOWatch</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="tracker.html">Live Tracker</a></li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="notable.html">Notable Asteroids</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container container-narrow py-4">
      <header class="mb-4">
        <h1 class="section-title">Notable Asteroids</h1>
        <p class="section-sub m-0">
          A hand-curated gallery of famous impactors, mission targets and record-breakers.
          Hover any card to read its story.
        </p>
      </header>

      <!-- Search + category filter over the curated dataset -->
      <div class="row g-3 mb-4">
        <div class="col-12 col-md-8">
          <label class="form-label" for="notableSearch">Search</label>
          <input
            type="search"
            id="notableSearch"
            class="form-control"
            placeholder="e.g. Bennu, Tunguska, mission…"
          />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label" for="categoryFilter">Category</label>
          <select id="categoryFilter" class="form-select">
            <option value="all">All categories</option>
            <option value="Impact event">Impact event</option>
            <option value="Mission target">Mission target</option>
            <option value="Close approacher">Close approacher</option>
            <option value="Record-breaker">Record-breaker</option>
          </select>
        </div>
      </div>

      <div id="notableGrid" class="card-grid"></div>
    </main>

    <footer class="site-footer">
      <p class="m-0">
        Built by Yorgo Hassabou · Facts summarised from NASA / JPL public sources
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/notable.js"></script>
  </body>
</html>
